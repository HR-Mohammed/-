<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="نظام الادارة والمتابعة" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>نظام الادارة والمتابعة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();

      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      try {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                          Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
        if (descriptor && !descriptor.writable) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Could not re-define fetch:', e);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
